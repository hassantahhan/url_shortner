name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: deploy-local
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build

      - name: Start worker locally
        run: npm run dev > dev.log 2>&1 &

      - name: Wait for worker health
        run: |
          for i in {1..30}; do
            if curl -fsS http://127.0.0.1:8787/health > /dev/null; then
              echo "Worker is healthy"
              exit 0
            fi
            sleep 2
          done
          echo "Worker did not become healthy in time"
          echo "--- dev.log ---"
          cat dev.log
          exit 1

      - name: Integration tests
        env:
          BASE_URL: http://127.0.0.1:8787
        run: npm test
