name = "url-shortener"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_sqlite_classes = ["AnalyticsObject"]

# Build configuration
[build]
command = "npm run build"
cwd = "./"

# Dev configuration
[env.development]
name = "url-shortener-dev"
workers_dev = true

[[env.development.kv_namespaces]]
binding = "URL_STORE"
id = "your-kv-namespace-id"

[[env.development.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-kv-namespace-id"

[[env.development.durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsObject"

# Prod configuration
[env.production]
name = "url-shortener"
routes = [
  { pattern = "your-domain.example.com", custom_domain = true }
]

[[env.production.kv_namespaces]]
binding = "URL_STORE"
id = "your-kv-namespace-id"

[[env.production.kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-kv-namespace-id"

[[env.production.durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsObject"
