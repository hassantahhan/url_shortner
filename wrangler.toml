name = "url-shortener"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# Use the 'workers_dev' flag for fast testing and development.
workers_dev = true

# Workers KV namespace bindings
[[kv_namespaces]]
binding = "URL_STORE"
id = "your-kv-namespace-id"

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "your-kv-namespace-id"

# Durable Objects binding
[[durable_objects.bindings]]
name = "ANALYTICS"
class_name = "AnalyticsObject"

# Durable Objects migrations
[[migrations]]
tag = "v1"
new_classes = ["AnalyticsObject"]

# Build configuration
[build]
command = "npm run build"
cwd = "./"

# Dev configuration
[env.development]
name = "url-shortener-dev"
routes = [
  { pattern = "localhost/*" }
]

# Prod configuration
[env.production]
name = "url-shortener"
routes = [
  { pattern = "short.example.com", custom_domain = true }
]
